<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolf_Stocks — AI-Powered Stock Market Intelligence</title>
<style>
  :root { --gold: #C8A84B; --bg: #0D1018; --card: #161B22; --text: #E6EDF3; --dim: #8B949E; --up: #3FB950; --down: #F85149; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.5; overflow-x: hidden; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
  header { padding: 40px 0; text-align: center; border-bottom: 1px solid #30363D; margin-bottom: 40px; }
  .logo { font-size: 32px; font-weight: 800; color: var(--gold); letter-spacing: -1px; text-transform: uppercase; }
  .ticker-wrap { background: #161B22; padding: 12px 0; border-bottom: 1px solid #30363D; position: sticky; top: 0; z-index: 100; overflow: hidden; white-space: nowrap; }
  .ticker-move { display: inline-block; animation: ticker 30s linear infinite; }
  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .t-item { display: inline-block; margin-right: 40px; font-weight: 600; font-size: 14px; }
  .t-val { margin-left: 8px; }
  .up { color: var(--up); } .down { color: var(--down); }
  .search-section { text-align: center; margin-bottom: 60px; }
  .search-box { display: flex; max-width: 600px; margin: 0 auto; gap: 10px; }
  input { flex: 1; background: #0D1117; border: 1px solid #30363D; border-radius: 6px; padding: 12px 16px; color: #fff; font-size: 16px; outline: none; transition: border .2s; }
  input:focus { border-color: var(--gold); }
  button { background: var(--gold); color: #000; border: none; border-radius: 6px; padding: 12px 24px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
  button:hover { opacity: 0.9; }
  #researchResult { max-width: 800px; margin: 0 auto 60px; }
  .res-card { background: var(--card); border: 1px solid #30363D; border-radius: 12px; padding: 30px; animation: slideUp 0.4s ease-out; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-move" id="tickerContent">
    <span class="t-item">LOADING MARKET DATA...</span>
  </div>
</div>

<header class="container">
  <div class="logo">Wolf_Stocks</div>
  <p style="color:var(--dim); margin-top:10px;">55 AI Agents • Real-time NSE/BSE Intel • Zero Fees</p>
</header>

<main class="container">
  <section class="search-section">
    <h2 style="margin-bottom:20px;">Run AI Research on any Indian Stock</h2>
    <div class="search-box">
      <input type="text" id="stockInput" placeholder="Enter Symbol (e.g. RELIANCE, TATAMOTORS)">
      <button onclick="getResearch()">ANALYZE</button>
    </div>
  </section>

  <div id="researchResult"></div>
</main>

<script>
/** ════════════════════════════════════════════════════════════════
 * WOLF_STOCKS UNIFIED FRONT-END LOGIC
 * Connects to Master Core: ...879Bg/exec
 * ════════════════════════════════════════════════════════════════ */

const MASTER_API = "https://script.google.com/macros/s/AKfycbxDagUffWo6t_vHsde6OEpWeETMtg0ibPfJ1mvHJ3pXohDN3kQ7tMn-IWhj7Qzeo879Bg/exec";

// 1. UPDATE LIVE TICKER FROM SHEET
async function updateTicker() {
  try {
    const response = await fetch(`${MASTER_API}?type=ticker`);
    const data = await response.json();
    
    if (data.indices) {
      let html = "";
      for (let name in data.indices) {
        const item = data.indices[name];
        const colorClass = item.pct >= 0 ? 'up' : 'down';
        const arrow = item.pct >= 0 ? '▲' : '▼';
        html += `
          <span class="t-item">
            ${name} <span class="t-val ${colorClass}">${item.price} (${arrow}${Math.abs(item.pct)}%)</span>
          </span>`;
      }
      // Duplicate for smooth infinite loop
      document.getElementById('tickerContent').innerHTML = html + html;
    }
  } catch (e) {
    console.error("Ticker Error:", e);
  }
}

// 2. RUN AI RESEARCH ENGINE
async function getResearch() {
  const symbol = document.getElementById('stockInput').value.toUpperCase().trim();
  const resDiv = document.getElementById('researchResult');
  
  if (!symbol) return alert("Please enter a stock symbol.");
  
  resDiv.innerHTML = `<div style="text-align:center; padding:40px; color:var(--gold);">
    <div class="spinner"></div><br>AI AGENTS SCANNING NSE FOR ${symbol}...</div>`;

  try {
    const response = await fetch(`${MASTER_API}?symbol=${symbol}`);
    const data = await response.json();
    
    if (data.error) {
      resDiv.innerHTML = `<div class="res-card" style="border-color:var(--down);">Error: ${data.errorMsg}</div>`;
      return;
    }

    renderResearchCard(data);
  } catch (e) {
    resDiv.innerHTML = `<div class="res-card" style="border-color:var(--down);">Connection failed. Please check Web App deployment.</div>`;
  }
}

// 3. RENDER THE ANALYSIS CARD
function renderResearchCard(d) {
  const resDiv = document.getElementById('researchResult');
  const sigColor = d.signal === 'BUY' ? 'var(--up)' : 'var(--down)';
  
  resDiv.innerHTML = `
    <div class="res-card">
      <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:20px;">
        <div>
          <h2 style="font-size:28px;">${d.symbol}</h2>
          <span style="color:var(--dim)">LTP: ₹${d.price} (${d.pct}%)</span>
        </div>
        <div style="text-align:right;">
          <div style="background:${sigColor}; color:#000; padding:4px 12px; border-radius:4px; font-weight:800;">${d.signal}</div>
        </div>
      </div>
      
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; border-top:1px solid #30363D; padding-top:20px;">
        <div>
          <p style="color:var(--dim); font-size:12px;">52W HIGH / LOW</p>
          <p>₹${d.high52} / ₹${d.low52}</p>
        </div>
        <div>
          <p style="color:var(--dim); font-size:12px;">MARKET CAP</p>
          <p>₹${(d.mcap/10000000).toFixed(2)} Cr</p>
        </div>
      </div>
      
      <p style="margin-top:20px; font-style:italic; color:var(--gold);">"WOLF AI: Analysis logged to Master Sheet. Awaiting CEO action for social blast."</p>
    </div>
  `;
}

// Initial Load
updateTicker();
setInterval(updateTicker, 60000); // Refresh ticker every minute

</script>
</body>
</html>
