<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #000; color: #d4af37; font-family: sans-serif; text-align: center; }
    .nfp-banner { background: gold; color: #000; padding: 10px; font-weight: bold; }
    .search-box { margin-top: 50px; }
    input { padding: 10px; width: 250px; }
    button { padding: 10px 20px; background: #d4af37; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="nfp-banner">🐺 NFP MISSION: MARCH 7 LIVE | COUNTDOWN ACTIVE</div>
  <img src="https://i.postimg.cc/ZYvqkxkw/final-DP-logo.png" width="120">
  <h1>WOLF STOCKS AI</h1>
  
  <div class="search-box">
    <input type="text" id="sym" placeholder="Enter Symbol (e.g. SBIN)">
    <button onclick="runSearch()">RESEARCH</button>
    <div id="res"></div>
  </div>

  <script>
    function runSearch() {
      const s = document.getElementById('sym').value;
      const url = "https://script.google.com/macros/s/AKfycbyS5fffF5XRQKnBJjdYMe50gtCA_VjaVpS5qpAGa0RXtkz0zVFvYlaFvyDOayuswS419A/exec?symbol=" + s;
      document.getElementById('res').innerText = "Scanning NSE Infrastructure...";
      fetch(url).then(r => r.json()).then(d => {
        document.getElementById('res').innerHTML = "<h3>" + s + "</h3><p>Sovereign Analysis Complete.</p>";
      });
    }
  </script>
</body>
</html>
