<style>
:root{
  --bg:#07090C;--bg2:#0D1018;--bg3:#131720;--card:#0F1319;
  --g1:#C8A84B;--g2:#E6C76A;--g3:#F4DC9E;
  --gdim:rgba(200,168,75,.07);--gbord:rgba(200,168,75,.16);--gbri:rgba(200,168,75,.4);
  --txt:#EDE8DC;--txt2:#828890;--txt3:#2A3040;
  --post:#2ECC71;--postbg:rgba(46,204,113,.08);--postbord:rgba(46,204,113,.22);
  --negt:#E74C3C;--negtbg:rgba(231,76,60,.08);--negtbord:rgba(231,76,60,.22);
  --warn:#F39C12;--warnbg:rgba(243,156,18,.08);
  --r:10px;--rsm:6px;--font:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--font);overflow-x:hidden}
a{text-decoration:none;color:inherit}
::selection{background:var(--g1);color:#000}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--g1)}
body{-webkit-user-select:none;-moz-user-select:none;user-select:none}
img{pointer-events:none;-webkit-user-drag:none}

/* BANNER */
.site-banner{width:100%;background:#000;display:block;overflow:hidden;
  position:relative;border-bottom:2px solid var(--gbord);cursor:pointer}
.site-banner img{width:100%;height:175px;object-fit:cover;object-position:center center;display:block}
@media(max-width:900px){.site-banner img{height:140px}}
@media(max-width:600px){.site-banner img{height:100px}}

/* NAV */
.nav{position:sticky;top:0;z-index:500;background:rgba(7,9,12,.97);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--gbord);height:50px;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;gap:10px}
.nav-right-group{display:flex;align-items:center;gap:6px;margin-left:auto}
.nav-live-pill{display:flex;align-items:center;gap:0;border:1px solid var(--gbord);
  border-radius:var(--rsm);background:var(--bg3);flex-shrink:0;overflow:hidden;margin-right:auto!important}
.nlp-dot{width:6px;height:6px;border-radius:50%;background:var(--post);
  animation:pulse 1.8s infinite;flex-shrink:0;margin:0 8px}
.nlp-item{display:flex;align-items:center;gap:3px;padding:5px 9px;
  border-left:1px solid var(--txt3)}
.nlp-sym{font-size:8.5px;font-weight:700;color:var(--txt2);letter-spacing:.3px;white-space:nowrap}
.nlp-val{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;
  color:var(--txt);white-space:nowrap;margin:0 3px}
.nlp-chg{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;white-space:nowrap}
.nav-links{display:flex;gap:1px}
.navl{padding:5px 9px;border-radius:var(--rsm);font-size:11px;font-weight:500;color:var(--txt2);
  cursor:pointer;background:none;border:none;font-family:var(--font);transition:all .2s;white-space:nowrap}
.navl:hover,.navl.on{color:var(--g2);background:var(--gdim)}
.nav-cta{padding:6px 13px;background:linear-gradient(135deg,var(--g1),var(--g2));color:#000;border:none;
  border-radius:var(--rsm);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);
  transition:all .2s;white-space:nowrap;flex-shrink:0}
.nav-cta:hover{box-shadow:0 0 16px rgba(200,168,75,.45);transform:translateY(-1px)}
.burger{display:none;background:none;border:none;cursor:pointer;padding:3px;flex-shrink:0}
.bl{width:18px;height:1.5px;background:var(--g1);margin:4px 0;border-radius:1px}

/* NFP ALERT BAR */
.nfp-bar{background:linear-gradient(90deg,rgba(231,76,60,.1),rgba(243,156,18,.07),rgba(231,76,60,.1));
  border-bottom:1px solid rgba(231,76,60,.2);padding:6px 24px;display:flex;align-items:center;
  justify-content:center;gap:10px;cursor:pointer;transition:background .2s}
.nfp-pulse{width:7px;height:7px;border-radius:50%;background:var(--negt);animation:pulse 1.4s infinite;flex-shrink:0}
.nfp-text{font-size:11px;font-weight:600;color:var(--txt)}
.nfp-text span{color:var(--negt)}

/* RESEARCH TOOL SECTION */
.rt-wrap{background:linear-gradient(135deg,rgba(200,168,75,.07),rgba(200,168,75,.02));
  border:1px solid var(--gbord);border-radius:var(--r);padding:14px}
.rt-row{display:flex;gap:6px;margin-bottom:7px}
.rt-input{flex:1;background:var(--bg3);border:1px solid var(--gbord);border-radius:var(--rsm);
  padding:9px 11px;color:var(--txt);font-size:13px;font-family:var(--font);outline:none;
  transition:border .2s;text-transform:uppercase;letter-spacing:.5px}
.rt-btn{padding:9px 15px;background:linear-gradient(135deg,var(--g1),var(--g2));color:#000;border:none;
  border-radius:var(--rsm);font-weight:700;font-size:12px;cursor:pointer;font-family:var(--font);white-space:nowrap}

/* NFP COUNTDOWN PAGE */
.nfp-countdown{display:flex;gap:10px;justify-content:center;margin:14px 0}
.nfp-ct{background:rgba(7,9,12,.6);border:1px solid rgba(231,76,60,.28);border-radius:var(--rsm);
  padding:10px 14px;text-align:center;min-width:65px}
.nfp-ct-v{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;color:var(--negt)}

/* GLOBAL ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
</style>
</head>
<body>

<div class="nfp-bar" onclick="location.href='#nfp'">
    <div class="nfp-pulse"></div>
    <div class="nfp-text">WOLF STOCKS NFP MISSION: <span id="nfp-banner-timer">LOADING COUNTDOWN...</span></div>
</div>

<nav class="nav">
    <div class="fl-brand">WOLF_STOCKS</div>
    <div class="nav-links">
        <button class="navl" onclick="showPage('home')">Home</button>
        <button class="navl" onclick="showPage('research')">Research</button>
        <button class="navl" onclick="showPage('academy')">Academy</button>
        <button class="nav-cta">JOIN WAR ROOM</button>
    </div>
</nav>

<div id="home" class="page on">
    <section class="rt-wrap" style="margin: 20px;">
        <div class="rt-head">
            <div class="rt-icon">🔬</div>
            <div>
                <div class="rt-title">SOVEREIGN RESEARCH ENGINE</div>
                <div class="rt-sub">Direct access to NSE/BSE Scrapers. Data syncs to War Room.</div>
            </div>
        </div>
        <div class="rt-row">
            <input type="text" id="sym" class="rt-input" placeholder="Enter Symbol (e.g. RELIANCE)">
            <button class="rt-btn" onclick="runSovereignSearch()">SCAN ALPHA</button>
        </div>
        <div id="res" style="margin-top:10px; font-size:12px; color:var(--g2);"></div>
    </section>

    <section id="nfp" class="nfp-wrap" style="text-align:center; padding:40px;">
        <h2 class="sec-h2">NFP MISSION 🐺</h2>
        <div class="nfp-countdown">
            <div class="nfp-ct"><div class="nfp-ct-v" id="d">00</div><div class="nfp-ct-l">DAYS</div></div>
            <div class="nfp-ct"><div class="nfp-ct-v" id="h">00</div><div class="nfp-ct-l">HOURS</div></div>
            <div class="nfp-ct"><div class="nfp-ct-v" id="m">00</div><div class="nfp-ct-l">MINS</div></div>
        </div>
    </section>
</div>

<script>
// 1. NAVIGATION LOGIC
function showPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('on'));
    document.getElementById(p).classList.add('on');
}

// 2. SOVEREIGN RESEARCH TOOL (FIXED)
function runSovereignSearch() {
    const symbol = document.getElementById('sym').value.toUpperCase().trim();
    if (!symbol) return;
    
    const res = document.getElementById('res');
    res.innerHTML = "📡 <i>Accessing Sovereign Scrapers...</i>";
    
    // Deployment URL from Master Plan
    const url = "https://script.google.com/macros/s/AKfycbzehdMjKpD3rP1FjF-BHpIT4w9wog0VlnfC2cM8_TilLLeqsEHzjwKjMehhkN9iLuy7fA/exec?symbol=" + symbol;
    
    fetch(url)
        .then(r => r.json())
        .then(d => {
            res.innerHTML = "✅ <b>" + symbol + "</b>: " + (d.status || "Alpha Logged to War Room");
        })
        .catch(e => {
            res.innerHTML = "⚠️ Sovereign Link Offline. Syncing to Telegram...";
        });
}

// 3. NFP COUNTDOWN (FIXED)
function updateNFP() {
    const target = new Date("March 7, 2026 18:30:00").getTime();
    const now = new Date().getTime();
    const diff = target - now;
    
    if (diff <= 0) {
        document.getElementById('nfp-banner-timer').innerText = "MISSION LIVE";
        return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

    document.getElementById('d').innerText = d.toString().padStart(2, '0');
    document.getElementById('h').innerText = h.toString().padStart(2, '0');
    document.getElementById('m').innerText = m.toString().padStart(2, '0');
    document.getElementById('nfp-banner-timer').innerText = d + "D " + h + "H REMAINING";
}

setInterval(updateNFP, 1000);
updateNFP();
</script>

</body>
