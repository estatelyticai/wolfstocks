<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolf_Stocks — AI-Powered Stock Market Intelligence</title>
<style>
  :root { --gold: #C8A84B; --bg: #0D1018; --card: #161B22; --text: #E6EDF3; --dim: #8B949E; --up: #3FB950; --down: #F85149; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.5; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
  header { padding: 40px 0; text-align: center; border-bottom: 1px solid #30363D; margin-bottom: 40px; }
  .logo { font-size: 32px; font-weight: 800; color: var(--gold); letter-spacing: -1px; text-transform: uppercase; }
  
  /* Ticker Styles */
  .ticker-wrap { background: #161B22; padding: 12px 0; border-bottom: 1px solid #30363D; position: sticky; top: 0; z-index: 100; overflow: hidden; white-space: nowrap; }
  .ticker-move { display: inline-block; animation: ticker 35s linear infinite; }
  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .t-item { display: inline-block; margin-right: 40px; font-weight: 600; font-size: 14px; }
  .t-val { margin-left: 8px; }
  .up { color: var(--up); } .down { color: var(--down); }

  /* Search Styles */
  .search-section { text-align: center; margin-bottom: 60px; }
  .search-box { display: flex; max-width: 600px; margin: 20px auto; gap: 10px; }
  input { flex: 1; background: #0D1117; border: 1px solid #30363D; border-radius: 6px; padding: 12px 16px; color: #fff; font-size: 16px; outline: none; }
  input:focus { border-color: var(--gold); }
  button { background: var(--gold); color: #000; border: none; border-radius: 6px; padding: 12px 24px; font-weight: 700; cursor: pointer; }
  
  /* Result Card */
  #researchResult { max-width: 800px; margin: 0 auto 60px; }
  .res-card { background: var(--card); border: 1px solid #30363D; border-radius: 12px; padding: 30px; animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
  .stat-label { color: var(--dim); font-size: 12px; text-transform: uppercase; }
</style>
</head>
